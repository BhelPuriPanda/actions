name: Deploy Express App

"on":
  push:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Run linter
        run: npm run lint

      - name: Build check
        run: npm run build

      - name: Run tests
        run: npm test

  deploy:
    needs: checks
    runs-on: self-hosted
    env:
      PORT: ${{ secrets.PORT }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Stop existing container
        run: docker compose down
        continue-on-error: true

      - name: Build and start
        run: docker compose up -d --build
      
      - name: Check it's running
        run: Invoke-WebRequest -Uri http://localhost:${{ secrets.PORT }} -UseBasicParsing

      - name: Notify success
        if: success()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage `
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} `
            -d text="✅ Deploy succeeded! Commit: ${{ github.sha }}"

      - name: Notify failure
        if: failure()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage `
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} `
            -d text="❌ Deploy failed! Commit: ${{ github.sha }}"