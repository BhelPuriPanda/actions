name: Deploy Express App

"on":
  push:
    branches: [main, dev]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Run linter
        run: npm run lint

      - name: Build check
        run: npm run build

      - name: Run tests
        run: npm test

  deploy-staging:
    needs: checks
    if: github.ref == 'refs/heads/dev'
    runs-on: self-hosted
    env:
      STAGING_PORT: ${{ secrets.STAGING_PORT }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Stop staging container
        run: docker compose -f docker-compose.staging.yml down
        continue-on-error: true

      - name: Build and start staging
        run: docker compose -f docker-compose.staging.yml up -d --build

      - name: Notify staging success
        if: success()
        run: |
          curl.exe -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" -d "text=🟡 Staging deploy succeeded! Commit: ${{ github.sha }}"

      - name: Notify staging failure
        if: failure()
        run: |
          curl.exe -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" -d "text=🔴 Staging deploy failed! Commit: ${{ github.sha }}"

  deploy-production:
    needs: checks
    if: github.ref == 'refs/heads/main'
    runs-on: self-hosted
    env:
      PORT: ${{ secrets.PORT }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Stop production container
        run: docker compose down
        continue-on-error: true

      - name: Build and start production
        run: docker compose up -d --build

      - name: Notify production success
        if: success()
        run: |
          curl.exe -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" -d "text=✅ Production deploy succeeded! Commit: ${{ github.sha }}"

      - name: Notify production failure
        if: failure()
        run: |
          curl.exe -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" -d "text=❌ Production deploy failed! Commit: ${{ github.sha }}"