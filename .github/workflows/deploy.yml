name: Deploy Express App

"on":
  push:
    branches: [main, dev]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Run linter
        run: npm run lint

      - name: Build check
        run: npm run build

      - name: Run tests
        run: npm test

  deploy-staging:
    needs: checks
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      STAGING_PORT: ${{ secrets.STAGING_PORT }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker asia-south1-docker.pkg.dev

      - name: Build and push image
        run: |
          docker build -t asia-south1-docker.pkg.dev/express-app-498710/express-app/express-app:staging .
          docker push asia-south1-docker.pkg.dev/express-app-498710/express-app/express-app:staging

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy express-app-staging \
            --image asia-south1-docker.pkg.dev/express-app-498710/express-app/express-app:staging \
            --platform managed \
            --region asia-south1 \
            --port 3000 \
            --allow-unauthenticated \
            --set-env-vars DATABASE_URL=${{ secrets.DATABASE_URL }}

      - name: Notify staging success
        if: success()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" -d "text=🟡 Staging deploy succeeded! Commit: ${{ github.sha }}"

      - name: Notify staging failure
        if: failure()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" -d "text=🔴 Staging deploy failed! Commit: ${{ github.sha }}"

  deploy-production:
    needs: checks
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker asia-south1-docker.pkg.dev

      - name: Build and push image
        run: |
          docker build -t asia-south1-docker.pkg.dev/express-app-498710/express-app/express-app:latest .
          docker push asia-south1-docker.pkg.dev/express-app-498710/express-app/express-app:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy express-app \
            --image asia-south1-docker.pkg.dev/express-app-498710/express-app/express-app:latest \
            --platform managed \
            --region asia-south1 \
            --port 3000 \
            --allow-unauthenticated \
            --set-env-vars DATABASE_URL=${{ secrets.DATABASE_URL }}

      - name: Notify production success
        if: success()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" -d "text=✅ Production deploy succeeded! Commit: ${{ github.sha }}"

      - name: Notify production failure
        if: failure()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" -d "text=❌ Production deploy failed! Commit: ${{ github.sha }}"