name: Deploy Express App

"on":
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Run linter
        run: npm run lint

      - name: Build check
        run: npm run build

  deploy:
    needs: lint
    runs-on: self-hosted
    env:
      PORT: ${{ secrets.PORT }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Stop existing container
        run: docker compose down
        continue-on-error: true   # won't fail if nothing is running yet

      - name: Build and start
        run: docker compose up -d --build
      
      - name: Check it's running
        run: Invoke-WebRequest -Uri http://localhost:${{ secrets.PORT }} -UseBasicParsing